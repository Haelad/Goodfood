#dev
services:
  db:
    build:
      context: ./compose/db/
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always
    networks:
      - backend_app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 500mb --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend_app

  web:
    build:
      context: .
      dockerfile: compose/django/Dockerfile
      args:
        ENV: dev  # устанавливает dev-зависимости (см. Dockerfile)
    image: goodfood-web:dev
    env_file:
      - .env
    restart: always
    volumes:
      - .:/app
      - ./static_collect:/app/static_collect
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy  # ждём готовности БД
      redis:
        condition: service_started
    networks:
      - backend_app
    environment:
      DJANGO_ENV: "local"
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_ADMIN_USER: ${DJANGO_ADMIN_USER}
      DJANGO_ADMIN_EMAIL: ${DJANGO_ADMIN_EMAIL}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD}
      DB_HOST: db

volumes:
  redis_data:
  pg_data:

networks:
  backend_app:
    driver: bridge