#production
services:
  db:
    build:
      context: ./compose/db/
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always
    networks:
      - backend_app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 500mb --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend_app

  web:
    build:
      context: .
      dockerfile: compose/django/Dockerfile
      args:
        ENV: production  # только основные зависимости, без dev
    image: goodfood-web:latest
    env_file:
      - .env
    restart: always
    # В prod НЕ монтируем код — он должен быть внутри образа
    volumes:
      - static_files:/app/static_collect
      - media_files:/app/media
    # expose вместо ports — web недоступен снаружи напрямую,
    # только через nginx внутри Docker-сети
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend_app
      - backend_proxy
    environment:
      DJANGO_ENV: "production"
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_ADMIN_USER: ${DJANGO_ADMIN_USER}
      DJANGO_ADMIN_EMAIL: ${DJANGO_ADMIN_EMAIL}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD}
      DB_HOST: db

  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./compose/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/static_collect:ro
      - media_files:/app/media:ro
      - ./certs:/etc/letsencrypt:ro
      - certbot_data:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend_proxy
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certs:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;"
    networks:
      - backend_proxy

volumes:
  redis_data:
  pg_data:
  static_files:   # именованный volume — nginx и web шарят статику
  media_files:    # именованный volume — nginx и web шарят медиа
  certbot_data:

networks:
  backend_proxy:
    driver: bridge
  backend_app:
    driver: bridge